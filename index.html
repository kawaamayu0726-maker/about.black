<!DOCTYPE html>
<html>
<head>
  <title>ゲームページ</title>
  <style>
    /* ページ全体を埋めるスタイル */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden; /* スクロールバーを消す */
    }
    iframe {
      border: none;       /* 枠線を消す */
      width: 100vw;       /* ビューポート幅いっぱい */
      height: 100vh;      /* ビューポート高さいっぱい */
    }
  </style>
</head>
<body>
  <iframe src="https://example.com"></iframe>
</body>
</html>
